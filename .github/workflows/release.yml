name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  BINARY_NAME: hvm-hikari-virtual-engine
  CARGO_TARGET_DIR: target
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  UNICORN_SOURCE_TAG: 2.1.4

jobs:
  build-linux-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools cmake

      - name: Hydrate vendored Unicorn qemu target sources
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          archive_url="https://github.com/unicorn-engine/unicorn/archive/refs/tags/${UNICORN_SOURCE_TAG}.tar.gz"
          curl -L "${archive_url}" -o "${tmp_dir}/unicorn.tar.gz"
          tar -xzf "${tmp_dir}/unicorn.tar.gz" -C "${tmp_dir}"
          rm -rf HVM/vendor/unicorn/qemu/target
          cp -a "${tmp_dir}/unicorn-${UNICORN_SOURCE_TAG}/qemu/target" HVM/vendor/unicorn/qemu/

      - name: Build Linux musl binary
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_DIR: ${{ env.CARGO_TARGET_DIR }}
        run: cargo build -p hvm-hikari-virtual-engine --release --target x86_64-unknown-linux-musl

      - name: Package Linux artifact
        run: |
          set -euo pipefail
          package_name="${BINARY_NAME}-${RELEASE_TAG}-x86_64-unknown-linux-musl"
          stage_dir="dist/${package_name}"
          mkdir -p "${stage_dir}"
          cp "${CARGO_TARGET_DIR}/x86_64-unknown-linux-musl/release/${BINARY_NAME}" "${stage_dir}/${BINARY_NAME}"
          cp README.md "${stage_dir}/README.md"
          tar -C dist -czf "dist/${package_name}.tar.gz" "${package_name}"
          sha256sum "dist/${package_name}.tar.gz" > "dist/${package_name}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-musl
          path: dist/*

  build-windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Hydrate vendored Unicorn qemu target sources
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          archive_url="https://github.com/unicorn-engine/unicorn/archive/refs/tags/${UNICORN_SOURCE_TAG}.tar.gz"
          curl -L "${archive_url}" -o "${tmp_dir}/unicorn.tar.gz"
          tar -xzf "${tmp_dir}/unicorn.tar.gz" -C "${tmp_dir}"
          rm -rf HVM/vendor/unicorn/qemu/target
          cp -a "${tmp_dir}/unicorn-${UNICORN_SOURCE_TAG}/qemu/target" HVM/vendor/unicorn/qemu/

      - name: Build Windows static CRT binary
        shell: pwsh
        env:
          CARGO_TARGET_DIR: ${{ env.CARGO_TARGET_DIR }}
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build -p hvm-hikari-virtual-engine --release --target x86_64-pc-windows-msvc

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $packageName = "${env:BINARY_NAME}-${env:RELEASE_TAG}-x86_64-pc-windows-msvc"
          $stageDir = Join-Path "dist" $packageName
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item "${env:CARGO_TARGET_DIR}/x86_64-pc-windows-msvc/release/${env:BINARY_NAME}.exe" (Join-Path $stageDir "${env:BINARY_NAME}.exe")
          Copy-Item "README.md" (Join-Path $stageDir "README.md")
          $archivePath = Join-Path "dist" "${packageName}.zip"
          if (Test-Path $archivePath) { Remove-Item $archivePath -Force }
          Compress-Archive -Path $stageDir -DestinationPath $archivePath
          $hash = (Get-FileHash $archivePath -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "${archivePath}.sha256" -Value "${hash}  $([System.IO.Path]::GetFileName($archivePath))"

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-msvc
          path: dist/*

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux-musl
      - build-windows-msvc
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: dist/*
